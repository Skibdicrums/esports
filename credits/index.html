<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sci-Fi Credits</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #02030a, #000);
        font-family: "Courier New", monospace;
        color: #00f7ff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .panel {
        width: 600px;
        padding: 25px;
        border: 2px solid #00f7ff;
        box-shadow: 0 0 25px #00f7ff, inset 0 0 15px rgba(0,255,255,0.2);
        background: rgba(0, 10, 20, 0.9);
    }

    h1 {
        text-align: center;
        letter-spacing: 4px;
        margin-bottom: 20px;
        text-shadow: 0 0 10px #00f7ff;
    }

    .person {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(0,247,255,0.3);
        transition: 0.3s;
    }

    .person:hover {
        background: rgba(0,247,255,0.08);
        box-shadow: 0 0 10px rgba(0,247,255,0.3);
    }

    .role {
        opacity: 0.7;
    }

    .name {
        color: #ffffff;
    }

    .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.6;
        animation: blink 1.5s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
    }
</style>
</head>
<body>

<div class="panel">
    <h1>◉ CREDITS ◉</h1>

    <div class="person">
        <div class="role">LEAD</div>
        <div class="name">[ mohammed lafy ]</div>
    </div>

    <div class="person">
        <div class="role">head of ideas</div>
        <div class="name">[ rayan dahmesh]</div>
    </div>

    <div class="person">
        <div class="role">ideas</div>
        <div class="name">[ mohammed fahad]</div>
    </div>

    <div class="person">
        <div class="role">ideas</div>
        <div class="name">[ rayan doasry ]</div>
    </div>

    <div class="footer">
        >> SYSTEM COMPLETE <<
    </div>
</div>

</body>
</html>
