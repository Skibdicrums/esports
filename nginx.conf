# nginx config for metapulse.lol
# Place this file at: /etc/nginx/sites-available/metapulse.lol
# Then: sudo ln -s /etc/nginx/sites-available/metapulse.lol /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d metapulse.lol -d www.metapulse.lol
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name metapulse.lol www.metapulse.lol;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name metapulse.lol www.metapulse.lol;

    # --- SSL (certbot fills these in automatically) ---
    ssl_certificate     /etc/letsencrypt/live/metapulse.lol/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metapulse.lol/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Serve static project files ---
    root /var/www/metapulse;
    index "index (poopnew).html";

    # Let nginx serve all static assets directly (fast)
    location ~* \.(html|css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf|webp)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Proxy /api/* to the Node.js server
    location /api/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 10s;
    }

    # Fallback → serve the main HTML for everything else
    location / {
        try_files $uri $uri/ /index%20(poopnew).html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
