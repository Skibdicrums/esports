<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sci-Fi Fidget Spinner</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #0a0f1f, #000);
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .spinner-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    .spinner {
        width: 200px;
        height: 200px;
        position: relative;
        border-radius: 50%;
        animation: glowPulse 2s infinite alternate;
    }

    .arm {
        position: absolute;
        width: 60px;
        height: 60px;
        background: linear-gradient(45deg, cyan, magenta);
        border-radius: 50%;
        box-shadow: 0 0 20px cyan, 0 0 40px magenta;
    }

    .arm:nth-child(1) { top: -20px; left: 70px; }
    .arm:nth-child(2) { bottom: -20px; left: 70px; }
    .arm:nth-child(3) { left: -20px; top: 70px; }
    .arm:nth-child(4) { right: -20px; top: 70px; }

    .core {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 60px;
        height: 60px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, #00ffff, #001f3f);
        border-radius: 50%;
        box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff;
    }

    @keyframes glowPulse {
        from {
            filter: drop-shadow(0 0 10px cyan);
        }
        to {
            filter: drop-shadow(0 0 30px magenta);
        }
    }

    .speed-indicator {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: #0ff;
        font-size: 18px;
        text-shadow: 0 0 10px #0ff;
    }
</style>
</head>
<body>

<div class="spinner-container">
    <div class="spinner" id="spinner">
        <div class="arm"></div>
        <div class="arm"></div>
        <div class="arm"></div>
        <div class="arm"></div>
        <div class="core"></div>
    </div>
</div>

<div class="speed-indicator" id="speedText">Speed: 0</div>

<script>
let spinner = document.getElementById("spinner");
let speedText = document.getElementById("speedText");

let speed = 0;
let angle = 0;
let friction = 0.98;

// Click to spin
document.body.addEventListener("click", () => {
    speed += Math.random() * 20 + 10;
});

// Mouse drag spin boost
let isDragging = false;
let lastX = 0;

document.addEventListener("mousedown", e => {
    isDragging = true;
    lastX = e.clientX;
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

document.addEventListener("mousemove", e => {
    if (isDragging) {
        let delta = e.clientX - lastX;
        speed += delta * 0.2;
        lastX = e.clientX;
    }
});

// Animation loop
function animate() {
    angle += speed;
    speed *= friction;

    spinner.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

    // Dynamic glow based on speed
    let glow = Math.min(Math.abs(speed) * 2, 50);
    spinner.style.filter = `drop-shadow(0 0 ${glow}px cyan)`;

    speedText.textContent = "Speed: " + speed.toFixed(2);

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
