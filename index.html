<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>METAPULSE — ESPORTS COMMAND</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyan:    #00f5ff;
            --magenta: #ff00c8;
            --yellow:  #ffe600;
            --green:   #39ff14;
            --bg:      #030610;
            --glass:   rgba(3, 12, 30, 0.88);
            
            --border:  rgba(0, 245, 255, 0.25);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            margin: 0;
            background: var(--bg);
            overflow: hidden;
        }

        /* ── CANVAS ── */
        canvas { display: block; }

        /* ── HUD OVERLAY (always visible over globe) ── */
        #hudOverlay {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* corner bracket */
        .hud-corner {
            position: absolute;
            width: 48px; height: 48px;
        }
        .hud-corner::before,
        .hud-corner::after {
            content: '';
            position: absolute;
            background: var(--cyan);
        }
        .hud-corner::before { width: 100%; height: 2px; top: 0; left: 0; }
        .hud-corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
        .hud-corner.tl { top: 18px; left: 18px; }
        .hud-corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
        .hud-corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
        .hud-corner.br { bottom: 18px; right: 18px; transform: scale(-1); }

        /* top-left title */
        #hudTitle {
            position: absolute;
            top: 30px; left: 72px;
        }
        #hudTitle .ht-label {
            font-size: 9px;
            letter-spacing: 5px;
            color: rgba(0,245,255,.4);
            text-transform: uppercase;
            font-family: 'Orbitron', monospace;
        }
        #hudTitle .ht-main {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }
        #hudTitle .ht-sub {
            font-size: 9px;
            letter-spacing: 6px;
            color: rgba(0,245,255,.3);
            font-family: 'Orbitron', monospace;
        }

        /* coords display */
        .coords-display {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: rgba(0,245,255,.06);
            border: 1px solid rgba(0,245,255,.2);
            color: rgba(0,245,255,.7);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            border-radius: 4px;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(8px);
            text-shadow: 0 0 10px var(--cyan);
        }

        /* ── POPUP PHOTO ── */
        #popupPhoto {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            display: none;
            z-index: 1000;
        }
        #popupPhoto img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* ── SIGNATURE (hidden by default, keep for compatibility) ── */
        .signature { display: none; }

        /* ════════════════════════════════════════
           MENU OVERLAY BASE
        ════════════════════════════════════════ */
        .menu {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            z-index: 20;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            animation: menuIn 0.4s cubic-bezier(0.16,1,0.3,1);
            overflow-y: auto;
            background: rgba(3, 6, 16, 0.92);
            backdrop-filter: blur(20px);
        }

        @keyframes menuIn {
            from { opacity: 0; transform: scale(1.03); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ════════════════════════════════════════
           CHOICE SCREEN — full-screen team picker
        ════════════════════════════════════════ */
        .choice-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            padding: 60px 20px 40px;
            /* diagonal slash accent */
            background:
                linear-gradient(135deg, rgba(0,245,255,.04) 0%, transparent 50%),
                linear-gradient(225deg, rgba(255,0,200,.04) 0%, transparent 50%);
        }

        /* animated border top line */
        .choice-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
            animation: scanLine 3s linear infinite;
        }
        @keyframes scanLine {
            0%   { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }

        .choice-screen h1 {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--cyan) 0%, #fff 50%, var(--magenta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: glitch 6s infinite;
        }
        @keyframes glitch {
            0%,95%,100% { text-shadow: none; transform: none; }
            96%  { text-shadow: -2px 0 var(--magenta); transform: skewX(-1deg); }
            97%  { text-shadow:  2px 0 var(--cyan);    transform: skewX(1deg); }
            98%  { text-shadow: none;                  transform: none; }
        }

        .choice-screen > p.cs-sub {
            font-size: 12px;
            letter-spacing: 8px;
            color: rgba(0,245,255,.4);
            text-transform: uppercase;
            font-family: 'Orbitron', monospace;
            margin-bottom: 48px;
        }

        /* choice buttons grid */
        .choice-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            padding: 10px 20px;
            max-width: 820px;
        }

        .country-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            padding: 10px 20px;
            max-width: 900px;
        }

        /* ── CHOICE / COUNTRY BUTTON ── */
        .choice-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cyan);
            background: rgba(0,245,255,.06);
            border: 1px solid rgba(0,245,255,.35);
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            transition: color .2s, border-color .2s, box-shadow .2s, transform .15s;
        }

        /* sweep shine */
        .choice-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 40%, rgba(0,245,255,.18) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform .4s ease;
        }
        .choice-button:hover::before { transform: translateX(100%); }

        .choice-button:hover {
            color: #fff;
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0,245,255,.5), inset 0 0 20px rgba(0,245,255,.08);
            transform: translateY(-3px);
        }
        .choice-button:active { transform: translateY(0); }

        .choice-button .team-logo {
            width: 32px; height: 32px;
            object-fit: contain;
        }

        /* ── CLOSE BUTTON ── */
        .close-button {
            position: absolute;
            top: 22px; left: 22px;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: 1px solid rgba(0,245,255,.35);
            border-radius: 4px;
            color: var(--cyan);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            z-index: 10;
        }
        .close-button:hover {
            background: rgba(0,245,255,.12);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0,245,255,.4);
            transform: none;
        }

        /* ════════════════════════════════════════
           SEARCH FEATURE
        ════════════════════════════════════════ */
        #searchBtn {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,245,255,.06);
            border: 2px solid rgba(0,245,255,.35);
            border-radius: 4px;
            color: var(--cyan);
            font-size: 24px;
            cursor: pointer;
            transition: all .2s;
            z-index: 15;
            pointer-events: all;
        }
        #searchBtn:hover {
            background: rgba(0,245,255,.12);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0,245,255,.4);
        }

        #searchModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 6, 16, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            z-index: 25;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
        }
        #searchModal.active {
            display: flex;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            margin-bottom: 40px;
        }

        .search-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-header h2 {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            color: var(--cyan);
            background: rgba(0,245,255,.06);
            border: 2px solid rgba(0,245,255,.35);
            border-radius: 4px;
            transition: all .2s;
        }
        .search-input:focus {
            outline: none;
            background: rgba(0,245,255,.12);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0,245,255,.3);
        }
        .search-input::placeholder {
            color: rgba(0,245,255,.5);
        }

        .search-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .search-mode-btn {
            padding: 10px 14px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(0,245,255,.8);
            background: rgba(0,245,255,.06);
            border: 1px solid rgba(0,245,255,.25);
            border-radius: 4px;
            cursor: pointer;
            transition: all .2s;
        }

        .search-mode-btn:hover {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0,245,255,.12);
        }

        .search-mode-btn.active {
            color: #fff;
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(0,245,255,.25);
            background: rgba(0,245,255,.16);
        }

        #searchResults {
            width: 100%;
            max-width: 600px;
            max-height: 500px;
            overflow-y: auto;
            padding: 0 20px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(0,245,255,.06);
            border: 1px solid rgba(0,245,255,.2);
            border-radius: 4px;
            cursor: pointer;
            transition: all .2s;
        }
        .search-result-item:hover {
            background: rgba(0,245,255,.12);
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(0,245,255,.25);
            transform: translateX(4px);
        }

        .search-result-logo {
            width: 32px;
            height: 32px;
            border-radius: 2px;
            background: rgba(0,245,255,.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .search-result-info {
            flex: 1;
        }
        .search-result-name {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--cyan);
        }
        .search-result-region {
            font-size: 11px;
            color: rgba(0,245,255,.5);
            margin-top: 2px;
        }

        .search-no-results {
            text-align: center;
            color: rgba(0,245,255,.5);
            font-size: 14px;
            padding: 40px 20px;
        }

        #searchCloseBtn {
            position: absolute;
            top: 22px;
            left: 22px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid rgba(0,245,255,.35);
            border-radius: 4px;
            color: var(--cyan);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        #searchCloseBtn:hover {
            background: rgba(0,245,255,.12);
            border-color: var(--cyan);
            box-shadow: 0 0 14px rgba(0,245,255,.4);
        }

        /* ════════════════════════════════════════
           MENU PANEL — team hub layout
        ════════════════════════════════════════ */
        .menu-panel {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        /* header */
        .menu-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(0,245,255,.15);
            background: rgba(0,245,255,.03);
        }
        .menu-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }
        .menu-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--cyan), #fff 60%, var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        /* tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(0,245,255,.15);
            background: rgba(0,0,0,.3);
        }
        .tab-button {
            flex: 1;
            padding: 14px 10px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(0,245,255,.45);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all .2s;
        }
        .tab-button:hover {
            color: var(--cyan);
            background: rgba(0,245,255,.04);
        }
        .tab-button.active {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
            background: rgba(0,245,255,.06);
            text-shadow: 0 0 12px var(--cyan);
        }

        /* tab content area */
        .tab-content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeUp .3s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .tab-content h2 {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(0,245,255,.5);
            text-transform: uppercase;
            margin-bottom: 24px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,245,255,.12);
        }

        /* ── GAME CARD ── */
        .game {
            margin-bottom: 18px;
            padding: 18px 20px;
            background: rgba(0,245,255,.03);
            border: 1px solid rgba(0,245,255,.12);
            border-left: 3px solid var(--cyan);
            border-radius: 2px 6px 6px 2px;
            transition: border-color .2s, background .2s;
        }
        .game:hover {
            background: rgba(0,245,255,.06);
            border-left-color: var(--magenta);
        }
        .game h3 {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--cyan);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .game ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .game li {
            padding: 4px 14px;
            border: 1px solid rgba(0,245,255,.2);
            border-radius: 2px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,.85);
            background: rgba(0,245,255,.04);
            letter-spacing: .5px;
            cursor: pointer;
            transition: all .2s;
        }
        .game li:hover {
            color: #fff;
            border-color: rgba(0,245,255,.55);
            background: rgba(0,245,255,.12);
            box-shadow: 0 0 12px rgba(0,245,255,.18);
        }
        .game li.player-tbd {
            color: rgba(255,255,255,.45);
            border-color: rgba(0,245,255,.12);
            background: rgba(0,245,255,.015);
            font-style: italic;
            cursor: default;
            box-shadow: none;
        }
        .game li.player-tbd:hover {
            color: rgba(255,255,255,.45);
            border-color: rgba(0,245,255,.12);
            background: rgba(0,245,255,.015);
            box-shadow: none;
        }

        #playerHubModal {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: none;
            background: rgba(3, 6, 16, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            overflow-y: auto;
        }
        #playerHubModal.active {
            display: block;
        }

        .playerhub-panel {
            width: 100%;
            max-width: 920px;
            margin: 24px auto;
            border: 1px solid rgba(0,245,255,.2);
            background: rgba(0,0,0,.35);
            border-radius: 8px;
            overflow: hidden;
        }

        .playerhub-header {
            position: relative;
            padding: 26px 24px 20px;
            border-bottom: 1px solid rgba(0,245,255,.14);
            background: linear-gradient(180deg, rgba(0,245,255,.08), rgba(0,245,255,.02));
        }
        .playerhub-header h2 {
            margin: 0;
            font-family: 'Orbitron', monospace;
            font-size: 30px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 12px rgba(0,245,255,.35);
        }
        .playerhub-sub {
            margin-top: 8px;
            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(0,245,255,.72);
            text-transform: uppercase;
            font-family: 'Orbitron', monospace;
        }

        #playerHubCloseBtn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 38px;
            height: 38px;
            border: 1px solid rgba(0,245,255,.35);
            border-radius: 4px;
            background: transparent;
            color: var(--cyan);
            font-size: 18px;
            cursor: pointer;
        }
        #playerHubCloseBtn:hover {
            background: rgba(0,245,255,.14);
            border-color: var(--cyan);
        }

        .playerhub-body {
            padding: 20px 24px 24px;
            display: grid;
            gap: 18px;
        }
        .playerhub-block {
            border: 1px solid rgba(0,245,255,.12);
            background: rgba(0,245,255,.03);
            border-radius: 6px;
            padding: 14px 16px;
        }
        .playerhub-block h3 {
            margin: 0 0 10px 0;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--cyan);
            text-transform: uppercase;
        }
        .playerhub-block ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 8px;
        }
        .playerhub-block li {
            padding: 8px 10px;
            border: 1px solid rgba(0,245,255,.14);
            border-radius: 4px;
            background: rgba(0,245,255,.04);
            color: rgba(255,255,255,.88);
            font-size: 14px;
        }

        .playerhub-timeline-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 10px;
            align-items: start;
            margin-bottom: 8px;
        }
        .playerhub-years {
            color: rgba(0,245,255,.88);
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .playerhub-team {
            color: rgba(255,255,255,.9);
            font-size: 14px;
        }

        @media (max-width: 720px) {
            .playerhub-header h2 { font-size: 24px; }
            .playerhub-timeline-row { grid-template-columns: 1fr; gap: 4px; }
        }
        .game-note { border-left-color: var(--yellow); }
        .game-note p {
            color: rgba(255,255,255,.6);
            font-size: 14px;
            line-height: 1.7;
        }

        /* ── ACHIEVEMENTS ── */
        .achievements-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .achievements-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border: 1px solid rgba(0,245,255,.1);
            border-left: 3px solid var(--yellow);
            border-radius: 2px 6px 6px 2px;
            background: rgba(255,230,0,.03);
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,.85);

            return overlayMenus.some((overlay) => overlay.contains(target));

        function setRaycasterPosition(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            if (
                clientX < rect.left || clientX > rect.right ||
                clientY < rect.top || clientY > rect.bottom
            ) {
                return false;
            }

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return true;
        }

        function handleGlobeInteraction(clientX, clientY, target) {
            if (isOverlayTarget(target) || !setRaycasterPosition(clientX, clientY)) {
                return;
            }

            const earthIntersects = raycaster.intersectObject(earth, false);

            if (earthIntersects.length > 0) {
                const point = earthIntersects[0].point.clone();
                earth.worldToLocal(point);
                const latClicked = Math.asin(point.y / 1);
                let lonClicked = Math.atan2(point.x, point.z);
                let latDeg = THREE.Math.radToDeg(latClicked);
                let lonDeg = THREE.Math.radToDeg(lonClicked);
                if (lonDeg < 0) lonDeg += 360;

                coordsDisplay.textContent = `Latitude: ${latDeg.toFixed(4)}°, Longitude: ${lonDeg.toFixed(4)}°`;

                coordsDisplay.textContent = 'Tap or click on the globe to show coordinates';

            } else if (clickedData && clickedData.isSpain) {
                window.location.href = 'europe/';
            }
        }

            touchTapState.moved = false;
            touchTapState.startX = event.clientX;
            touchTapState.startY = event.clientY;
        });

        renderer.domElement.addEventListener('pointermove', (event) => {
            if (!touchTapState.tracking || event.pointerType === 'mouse') {
                return;
            }

            if (Math.hypot(event.clientX - touchTapState.startX, event.clientY - touchTapState.startY) > 12) {
                touchTapState.moved = true;
            }
        });

        renderer.domElement.addEventListener('pointerup', (event) => {
            if (!touchTapState.tracking || event.pointerType === 'mouse') {
                return;
            }

            const touchMoved = touchTapState.moved;
            touchTapState.tracking = false;
            touchTapState.moved = false;

            if (touchMoved) {
                return;
            }

            suppressClickUntil = Date.now() + 500;
            handleGlobeInteraction(
                event.clientX,
                event.clientY,
                document.elementFromPoint(event.clientX, event.clientY) || event.target
            );
        });

        renderer.domElement.addEventListener('pointercancel', () => {
            touchTapState.tracking = false;
            touchTapState.moved = false;
        });

        // iOS fix: pointercancel fires instead of pointerup when OrbitControls
        // captures the touch, so use independent touchstart/touchend state.
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if (isIOS) {
            const iosTap = { active: false, moved: false, x: 0, y: 0 };

            renderer.domElement.addEventListener('touchstart', (event) => {
                if (event.touches.length !== 1) { iosTap.active = false; return; }
                iosTap.active = true;
                iosTap.moved = false;
                iosTap.x = event.touches[0].clientX;
                iosTap.y = event.touches[0].clientY;
            }, { passive: true });

            renderer.domElement.addEventListener('touchmove', (event) => {
                if (!iosTap.active || event.touches.length !== 1) return;
                if (Math.hypot(event.touches[0].clientX - iosTap.x, event.touches[0].clientY - iosTap.y) > 12) {

            }, { passive: true });

                if (!iosTap.active) return;
                const moved = iosTap.moved;
                iosTap.active = false;
                iosTap.moved = false;

            { name: 'Gen.G', region: 'Asia', url: 'geng/', logo: 'https://icons.duckduckgo.com/ip3/geng.gg.ico' },
            { name: 'Edward Gaming', region: 'Asia', url: 'edg/', logo: 'https://icons.duckduckgo.com/ip3/edgteam.cn.ico' },
            { name: 'Weibo Gaming', region: 'Asia', url: 'weibo/', logo: 'https://icons.duckduckgo.com/ip3/weibo.com.ico' },
            { name: 'AG (All Gamers)', region: 'Asia', url: 'ag/', logo: 'https://icons.duckduckgo.com/ip3/allgamers.com.ico' },
            { name: 'JD Gaming', region: 'Asia', url: 'jdg/', logo: 'https://icons.duckduckgo.com/ip3/jdgaming.com.ico' },
            { name: 'FURIA Esports', region: 'South America', url: 'furia/', logo: 'https://icons.duckduckgo.com/ip3/furia.gg.ico' },
            { name: 'Leviatan', region: 'South America', url: 'leviatan/', logo: '' },
            { name: '9z Team', region: 'South America', url: '9z/', logo: 'https://icons.duckduckgo.com/ip3/9z.gg.ico' },
        ];

        function renderSearchResults(query, mode) {
            const q = (query || '').trim().toLowerCase();
            let results = [];
            if (mode === 'countries') {
                const hubs = [
                    { name: '⚡ MENA Hub', region: 'Middle East', url: 'mena/' },
                    { name: '🌍 Europe Hub', region: 'Europe', url: 'europe/' },
                    { name: '🇺🇸 Americas Hub', region: 'Americas', url: 'americas/' },
                    { name: '🌏 Asia Hub', region: 'Asia', url: 'asia/' },
                    { name: '🌎 South America Hub', region: 'South America', url: 'south-america/' },
                    { name: '👤 Player Hub', region: 'All Regions', url: 'player-hub/' },
                ];
                results = hubs.filter(h => !q || h.name.toLowerCase().includes(q) || h.region.toLowerCase().includes(q));
            } else if (mode === 'players' || mode === 'allPlayers') {
                searchResults.innerHTML = '<div class="search-no-results">👤 Visit the <a href="player-hub/" style="color:var(--cyan);">Player Hub</a> to search players.</div>';
                return;
            } else {
                results = allTeamLinks.filter(t => !q || t.name.toLowerCase().includes(q) || t.region.toLowerCase().includes(q));
            }
            if (!results.length) {
                searchResults.innerHTML = '<div class="search-no-results">No results found.</div>';
                return;
            }
            searchResults.innerHTML = results.map(t => `
                <a href="${t.url}" class="search-result-item" style="text-decoration:none;">
                    <div class="search-result-logo">${t.logo ? `<img src="${t.logo}" alt="" style="width:100%;height:100%;object-fit:contain;">` : '🎮'}</div>
                    <div class="search-result-info">
                        <div class="search-result-name">${t.name}</div>
                        <div class="search-result-region">${t.region}</div>
                    </div>
                </a>
            `).join('');
        }

        const searchBtn = document.getElementById('searchBtn');
        const searchModal = document.getElementById('searchModal');
        const searchCloseBtn = document.getElementById('searchCloseBtn');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchModeTeams = document.getElementById('searchModeTeams');
        const searchModePlayers = document.getElementById('searchModePlayers');
        const searchModeCountries = document.getElementById('searchModeCountries');
        const searchModeAllTeams = document.getElementById('searchModeAllTeams');
        const searchModeAllPlayers = document.getElementById('searchModeAllPlayers');
        let currentSearchMode = 'teams';

        function setSearchMode(mode) {
            currentSearchMode = mode;
            [searchModeTeams, searchModePlayers, searchModeCountries, searchModeAllTeams, searchModeAllPlayers].forEach(btn => btn.classList.remove('active'));
            ({ teams: searchModeTeams, players: searchModePlayers, countries: searchModeCountries, allTeams: searchModeAllTeams, allPlayers: searchModeAllPlayers })[mode].classList.add('active');
            renderSearchResults(searchInput.value, mode);
        }

        function closeSearchModal() {
            searchModal.classList.remove('active');
            searchInput.value = '';
            searchResults.innerHTML = '';
        }

        searchBtn.addEventListener('click', (e) => { e.stopPropagation(); searchModal.classList.add('active'); searchInput.focus(); renderSearchResults('', currentSearchMode); });
        searchCloseBtn.addEventListener('click', closeSearchModal);
        searchInput.addEventListener('input', (e) => renderSearchResults(e.target.value, currentSearchMode));
        searchModeTeams.addEventListener('click', () => setSearchMode('teams'));
        searchModePlayers.addEventListener('click', () => setSearchMode('players'));
        searchModeCountries.addEventListener('click', () => setSearchMode('countries'));
        searchModeAllTeams.addEventListener('click', () => setSearchMode('allTeams'));
        searchModeAllPlayers.addEventListener('click', () => setSearchMode('allPlayers'));
        searchModal.addEventListener('click', (e) => { if (e.target === searchModal) closeSearchModal(); });

                window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
