<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; background:black; }
#popup {
  position:absolute;
  top:0;
  left:0;
  background:#111;
  color:white;
  padding:10px;
  display:none;
  border-radius:10px;
  pointer-events:none;
  transform:translate(-50%, -120%);
}
img { max-width:200px; display:block; }
</style>
</head>
<body>
<div id="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

<script>
// ---------- Scene ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,3);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- Lighting ----------
scene.add(new THREE.DirectionalLight(0xffffff, 1.2));
scene.add(new THREE.AmbientLight(0xffffff,0.4));

// ---------- Controls ----------
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.enablePan = false;
controls.minDistance = 1.5;
controls.maxDistance = 5;

// ---------- Globe ----------
const loader = new THREE.TextureLoader();
const globeMaterial = new THREE.MeshPhongMaterial({
  map: loader.load('images/IMG_3718.jpeg'), // 3D globe texture
  bumpMap: loader.load('images/IMG_3718.jpeg'),
  bumpScale: 0.02,
  specular: 0x222222,
  shininess: 15
});
const globe = new THREE.Mesh(new THREE.SphereGeometry(1,64,64), globeMaterial);
scene.add(globe);

// ---------- Countries ----------
const countries = [
  { name:"Saudi Arabia", lat:25, lng:45 },
  { name:"USA", lat:38, lng:-97 },
  { name:"Japan", lat:36, lng:138 },
  { name:"France", lat:46, lng:2 },
  { name:"Brazil", lat:-10, lng:-55 }
];

const markers = [];
countries.forEach(c=>{
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.02,16,16),
    new THREE.MeshBasicMaterial({ color:0xff0000 })
  );
  dot.position.copy(latLngToVector3(c.lat,c.lng,1.02));
  dot.userData = c;
  scene.add(dot);
  markers.push(dot);
});

// lat/lng → 3D
function latLngToVector3(lat,lng,radius=1){
  const phi = (90-lat)*(Math.PI/180);
  const theta = (lng+180)*(Math.PI/180);
  return new THREE.Vector3(
    -radius*Math.sin(phi)*Math.cos(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.sin(theta)
  );
}

// ---------- Popup ----------
const popup = document.getElementById('popup');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onClick(event){
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(markers);
  if(intersects.length>0){
    const data = intersects[0].object.userData;
    const imgPath = 'images/IMG_3717.jpeg'; // mansion image
    popup.innerHTML = `<h3>${data.name}</h3><img src="${imgPath}">`;
    popup.style.display='block';

    const target = intersects[0].object.position.clone().multiplyScalar(2.5);
    gsap.to(camera.position,{x:target.x,y:target.y,z:target.z,duration:1.5,onUpdate:()=>camera.lookAt(globe.position)});
  }
}

window.addEventListener('click',onClick);

// Popup follows marker
function updatePopup(){
  raycaster.setFromCamera(mouse,camera);
  const intersects = raycaster.intersectObjects(markers);
  if(intersects.length>0){
    const vec = intersects[0].object.position.clone();
    vec.project(camera);
    popup.style.left = ((vec.x+1)/2*window.innerWidth)+'px';
    popup.style.top = ((-vec.y+1)/2*window.innerHeight)+'px';
  }
}

// ---------- Animate ----------
function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y += 0.001;
  controls.update();
  updatePopup();
  renderer.render(scene,camera);
}
animate();

// ---------- Resize ----------
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
